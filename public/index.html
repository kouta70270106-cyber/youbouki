<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>妖忘記</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yuji+Mai&family=Yuji+Syuku&family=Shippori+Mincho+B1:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 名前入力モーダル -->
  <div id="name-modal" class="hidden">
    <div class="modal-box">
      <h2>妖忘記</h2>
      <p>あなたの名前を入力してください。<br>記憶をなくした子どもの旅が始まります。</p>
      <input id="name-input" type="text" maxlength="12" placeholder="なまえ" />
      <br>
      <button id="name-submit">旅に出る</button>
    </div>
  </div>

  <!-- オンライン対戦モーダル -->
  <div id="online-modal" class="hidden">
    <div class="modal-box">
      <h2>オンライン対戦</h2>
      <p>「部屋を作る」でコードを生成し、<br>相手に伝えて入室してもらおう。</p>
      <input id="room-code-input" type="text" maxlength="6" placeholder="コードを入力" />
      <div class="modal-btn-row">
        <button id="room-create-btn">部屋を作る</button>
        <button id="room-join-btn">入室する</button>
      </div>
      <p id="online-status"></p>
      <button id="online-back-btn">← 戻る</button>
    </div>
  </div>

  <!-- Phaser ゲーム領域 -->
  <div id="game-container"></div>

  <!-- ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <!-- ゲームスクリプト（読み込み順） -->
  <script src="js/data.js"></script>
  <script src="js/GameState.js"></script>
  <script src="js/SoundManager.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/TitleScene.js"></script>
  <script src="js/scenes/StoryScene.js"></script>
  <script src="js/scenes/BattleScene.js"></script>
  <script src="js/scenes/OnlineBattleScene.js"></script>
  <script src="js/scenes/OnlineScene.js"></script>
  <script src="js/scenes/CollectionScene.js"></script>
  <script src="js/scenes/DeckScene.js"></script>
  <script src="js/scenes/GachaScene.js"></script>
  <script src="js/scenes/HomeScene.js"></script>
  <script src="js/scenes/EndingScene.js"></script>
  <script src="js/scenes/ProfileScene.js"></script>
  <script src="js/scenes/AvatarSelectScene.js"></script>
  <script src="js/scenes/HomeYokaiSelectScene.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
